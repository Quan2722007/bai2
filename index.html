<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@latest/build/css/intlTelInput.css" />
        <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@latest/build/js/intlTelInput.min.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="section">
                <div class="box">
                    <div class="wrapText">Text</div>
                    <div class="wrapLetter">Full name</div>
                    <div class="wrapInput">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="e.g. John Doe" id="inputName" />
                    </div>
                    <p id="demo"></p>
                </div>
                <div class="box">
                    <div class="wrapText">Calendar</div>
                    <div class="wrapLetter">Start date</div>
                    <div class="wrapInput">
                        <input
                            type="text"
                            id="inputCalendar"
                            placeholder="mm/dd/yy"
                            onfocus="
                                this.type = 'date';
                                this.showPicker();
                            "
                            onblur="if (!this.value) this.type = 'text';"
                        />
                        <i class="fa-regular fa-calendar-days"></i>
                    </div>
                </div>
                <div class="box">
                    <div class="wrapText">Phone nummber</div>
                    <div class="wrapLetter">Phone number</div>
                    <div class="wrapInput">
                        <input type="tel" placeholder="111-222-3333" id="inputPhoneNumber" pattern="[0-9]*" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    </div>
                    <p id="notification"></p>
                </div>
                <div class="box">
                    <div class="wrapText">Multi-select</div>
                    <div class="wrapLetter">User</div>
                    <div class="wrapInput">
                        <input type="text" placeholder="Add user...(exemple@doe.com)" id="inputMulSelec" />
                        <button id="Add">Add</button>
                    </div>
                    <div class="wrapP">
                        <p id="notificationMul"></p>
                    </div>
                    <div id="MultiSelect"></div>
                </div>
                <div class="box">
                    <div class="wrapText">Credit card</div>
                    <div class="wrapLetter">Card number</div>
                    <div class="wrapInput">
                        <img src="masterCard.png" class="icon" />
                        <input type="credit-card" placeholder="1111-2222-3333-4444" id="inputCreditCard" maxlength="19" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    </div>
                    <p id="demo"></p>
                </div>
            </div>
            <div class="section">
                <div class="box boxChange">
                    <div class="wrapText">Link</div>
                    <div class="wrapLetter">Website</div>
                    <div class="wrapInput">
                        <div class="link">https://</div>
                        <input type="text" placeholder="example.com" id="inputLink" />
                        <div class="wrapIcon">
                            <i class="fa-regular fa-clone disable"></i>
                            <i class="fa-solid fa-check"></i>
                        </div>
                    </div>
                    <p id="linkWeb"></p>
                </div>
                <div class="box boxChange">
                    <div class="wrapText">Currency</div>
                    <div class="wrapLetter">Amount</div>
                    <div class="wrapInput">
                        <select class="currencySelect">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="VND">VND</option>
                        </select>
                        <span id="symbol"></span>
                        <input type="text" placeholder="0.00" id="inputMoney" oninput="this.value = this.value.replace(/[^0-9.]/g, '')" />
                    </div>
                </div>
                <div class="box boxChange">
                    <div class="wrapText">Password</div>
                    <div class="wrapLetter">Password</div>
                    <div class="wrapInput">
                        <input type="password" placeholder="password" id="inputPassword" />
                        <div class="buttonPassword">
                            <i class="fa-regular fa-eye"></i>
                            <i class="fa-regular fa-eye-slash"></i>
                        </div>
                    </div>
                    <p id="notificationPass"></p>
                </div>
                <div class="box boxChange">
                    <div class="wrapText">Search</div>
                    <div class="wrapLetter"></div>
                    <div class="wrapInput">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="search" placeholder="Search for anything" />
                    </div>
                    <p id="demo"></p>
                </div>
                <div class="box boxChange">
                    <div class="wrapText">Text area</div>
                    <div class="wrapLetter">Label</div>
                    <textarea placeholder="Write a comment" id="inputComment"></textarea>
                    <p id="conficationSub"></p>
                    <div class="submit">
                        <button>Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script src="mains.js"></script>
    <script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
</html>
